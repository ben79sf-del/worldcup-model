name: World Cup Model - Daily Predictions

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas numpy scipy scikit-learn

      - name: Write config.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p config
          python3 write_config.py

      - name: Run daily pipeline
        run: python run_daily.py --no-push

      - name: Push predictions via git
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/ben79sf-del/worldcup-model.git
          git add predictions/ || true
          git diff --staged --quiet || git commit -m "WC predictions update $(date -u +%Y-%m-%d)"
          git push
